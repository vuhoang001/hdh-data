# Trino catalog "iceberg" -> dùng REST catalog + MinIO (S3)
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://warehouse/

# Truy cập MinIO qua S3 native filesystem của Trino
# Creds lấy từ env để không lệch với .env (trước đây hardcode nên Trino không đọc được MinIO)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=${ENV:AWS_REGION}
s3.path-style-access=true
s3.aws-access-key=${ENV:AWS_ACCESS_KEY_ID}
s3.aws-secret-key=${ENV:AWS_SECRET_ACCESS_KEY}
