name: hdh-data

# ---------------------------------------------------------------------------
# Pipeline ETL học tập:  MinIO -> Iceberg (REST catalog) -> Spark -> Trino -> dbt
#   - minio          : object storage (S3) lưu file dữ liệu Iceberg
#   - mc             : job khởi tạo bucket "warehouse" rồi thoát
#   - iceberg-rest   : REST catalog quản lý metadata bảng Iceberg
#   - trino          : engine truy vấn SQL (đọc/ghi Iceberg)
#   - spark          : chạy pipeline ETL (PySpark)
#   - dbt            : transform + test dữ liệu (chạy qua Trino)
# ---------------------------------------------------------------------------

services:
  # ----------------------- Object storage (S3) -----------------------------
  minio:
    image: minio/minio:latest
    container_name: hdh-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console -> http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [hdh]

  # Tạo bucket warehouse rồi thoát (chạy 1 lần)
  mc:
    image: minio/mc:latest
    container_name: hdh-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${WAREHOUSE_BUCKET} &&
      mc anonymous set public local/${WAREHOUSE_BUCKET} &&
      echo '>> Bucket ${WAREHOUSE_BUCKET} san sang' &&
      exit 0
      "
    networks: [hdh]

  # ----------------------- Metastore DB cho Iceberg catalog ----------------
  # Nơi catalog lưu danh sách namespace/bảng và con trỏ tới metadata file trên MinIO.
  iceberg-postgres:
    image: postgres:16-alpine
    container_name: hdh-iceberg-postgres
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME}
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - iceberg-catalog-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [hdh]

  # ----------------------- Iceberg REST catalog ----------------------------
  iceberg-rest:
    build:
      context: ./iceberg-rest
      args:
        ICEBERG_VERSION: ${ICEBERG_VERSION}
    image: hdh-iceberg-rest:local
    container_name: hdh-iceberg-rest
    depends_on:
      mc:
        condition: service_completed_successfully
      iceberg-postgres:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      CATALOG_WAREHOUSE: s3://${WAREHOUSE_BUCKET}/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      # Mặc định của image là jdbc:sqlite::memory: -> DB sống theo từng connection,
      # pool đóng connection là mất sạch bảng đã tạo. Dùng Postgres làm metastore thật.
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/${CATALOG_DB_NAME}
      CATALOG_JDBC_USER: ${CATALOG_DB_USER}
      CATALOG_JDBC_PASSWORD: ${CATALOG_DB_PASSWORD}
    networks: [hdh]

  # ----------------------- Trino (SQL query engine) ------------------------
  trino:
    image: trinodb/trino:latest
    container_name: hdh-trino
    depends_on:
      - iceberg-rest
    ports:
      - "8080:8080"   # Trino UI / JDBC -> http://localhost:8080
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./trino/etc/catalog:/etc/trino/catalog:ro
    networks: [hdh]

  # ----------------------- Spark (ETL engine) ------------------------------
  spark:
    build:
      context: ./spark
      args:
        ICEBERG_VERSION: ${ICEBERG_VERSION}
    image: hdh-spark:local
    container_name: hdh-spark
    depends_on:
      - iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      # spark-submit chỉ add thư mục chứa script vào sys.path (vd bronze/),
      # nên phải trỏ thêm vào jobs/ để "from common import ..." thấy package
      PYTHONPATH: /opt/spark/jobs
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./data:/opt/spark/data:ro
    # Giữ container sống để exec spark-submit vào
    command: ["tail", "-f", "/dev/null"]
    networks: [hdh]

  # ----------------------- dbt (transform + test) --------------------------
  dbt:
    build:
      context: ./dbt
    image: hdh-dbt:local
    container_name: hdh-dbt
    depends_on:
      - trino
    volumes:
      - ./dbt/hdh_dbt:/usr/app/hdh_dbt
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml:ro
    working_dir: /usr/app/hdh_dbt
    command: ["tail", "-f", "/dev/null"]
    networks: [hdh]

volumes:
  minio-data:
  iceberg-catalog-db:

networks:
  hdh:
    name: hdh-net
