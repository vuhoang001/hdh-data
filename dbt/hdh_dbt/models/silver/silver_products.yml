version: 2

models:
  - name: silver_products
    description: "Sản phẩm đã làm sạch (silver layer). price là giá niêm yết hiện tại, KHÔNG phải giá đã bán"
    columns:
      - name: product_id
        description: "Khoá chính"
        tests:
          - not_null
          - unique
      - name: product_name
        tests:
          - not_null
      - name: category
        tests:
          - accepted_values:
              values: ["casual", "genz", "outdoor", "streetwear"]
      - name: size
        tests:
          - accepted_values:
              values: ["s", "m", "l", "xl"]
      - name: price
        description: "Giá niêm yết hiện tại — dùng order_items.unit_price để tính doanh thu"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: cogs
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: list_margin
        description: "price - cogs. Âm nghĩa là giá vốn cao hơn giá niêm yết"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
