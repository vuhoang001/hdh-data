version: 2

models:
  - name: stg_orders
    description: "Đơn hàng đã làm sạch (staging layer)"
    columns:
      - name: order_id
        description: "Khoá chính của đơn hàng"
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: status
        description: "Trạng thái đơn (đã chuẩn hoá về chữ thường)"
        tests:
          - accepted_values:
              values: ["completed", "pending", "cancelled"]
      - name: amount
        tests:
          - not_null
